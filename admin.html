<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { background-color: #121212; color: #ffffff; padding-bottom: 40px; font-family: sans-serif;}
        .header { background: linear-gradient(135deg, #2c3e50, #3498db); padding: 20px; text-align: center; border-radius: 0 0 15px 15px;}
        input, select, textarea { 
            width: 100%; padding: 12px; margin: 8px 0; background: #2d2d2d; 
            border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box;
        }
        h3 { color: #f9d423; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .req-box { background: #2d2d2d; padding: 12px; border-radius: 6px; margin-top: 10px; border-left: 4px solid #f39c12;}
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #2d2d2d; }
        .btn-submit { width: 100%; padding: 12px; border: none; font-weight: bold; color: white; border-radius: 6px; cursor: pointer; margin-top: 10px;}
        .btn-mini { padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🛡️ TOURNAMENT ADMIN CONTROL</h2>
        <p>Live Real-Time Data Panel</p>
    </div>

    <div style="padding: 15px;">
        
        <div class="card">
            <h3>📥 Player Deposit Requests (Live Sync)</h3>
            <div id="requests-container">
                <p style="color: #aaa; font-style: italic;">No pending deposit requests found...</p>
            </div>
        </div>

        <div class="card">
            <h3>🎮 Create & Update Match</h3>
            <label>Match Title:</label>
            <input type="text" id="match-title" placeholder="e.g., Daily Mega Match (Squad)">
            <label>Match Date & Time:</label>
            <input type="text" id="match-time" placeholder="e.g., 08:00 PM">
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"><label>Entry Fee (₹):</label><input type="number" id="match-fee" placeholder="20"></div>
                <div style="flex: 1;"><label>Per Kill (₹):</label><input type="number" id="match-kill" placeholder="5"></div>
            </div>
            <button class="btn-submit" style="background: #3498db;" onclick="publishMatchDetails()">Publish Live Match</button>
        </div>

        <div class="card">
            <h3>🔑 Update Room ID & Password</h3>
            <input type="text" id="room-id" placeholder="Enter Room ID">
            <input type="text" id="room-pass" placeholder="Enter Room Password">
            <button class="btn-submit" style="background: #28a745;" onclick="publishRoomDetails()">Publish Room Info</button>
        </div>
    </div>

    <script>
        // Your Web App's Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBiZkM5dnAX5ItZybHk_43j5yQGYgui-Jo",
            authDomain: "ff-tornament-app-9e3ae.firebaseapp.com",
            projectId: "ff-tornament-app-9e3ae",
            databaseURL: "https://ff-tornament-app-9e3ae-default-rtdb.firebaseio.com/",
            storageBucket: "ff-tornament-app-9e3ae.firebasestorage.app",
            messagingSenderId: "595326120234",
            appId: "1:595326120234:web:fc6f0e3f02977cadc16e53"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Listen for new Deposit Requests from Users
        database.ref('depositRequests').on('value', (snapshot) => {
            const container = document.getElementById('requests-container');
            container.innerHTML = ""; // Clear existing UI list
            let data = snapshot.val();
            
            if(!data) {
                container.innerHTML = `<p style="color: #aaa; font-style: italic;">No pending deposit requests found...</p>`;
                return;
            }

            // Loop object logs
            Object.keys(data).forEach((key) => {
                let req = data[key];
                if(req.status === "Pending") {
                    let htmlBox = `
                        <div class="req-box" id="box-${req.utrId}">
                            <p style="margin: 3px 0;"><strong>User Account:</strong> ${req.userUID}</p>
                            <p style="margin: 3px 0;"><strong>Amount Request:</strong> ₹ ${req.amount}</p>
                            <p style="margin: 3px 0; color: #f9d423;"><strong>UTR ID:</strong> ${req.utrId}</p>
                            <div style="display: flex; gap: 8px; margin-top: 8px;">
                                <button class="btn-mini" style="background:#28a745;" onclick="approveDeposit('${req.userUID}', ${req.amount}, '${req.utrId}')">Approve ✅</button>
                                <button class="btn-mini" style="background:#dc3545;" onclick="rejectDeposit('${req.utrId}')">Reject ❌</button>
                            </div>
                        </div>`;
                    container.innerHTML += htmlBox;
                }
            });
            if(container.innerHTML === "") {
                container.innerHTML = `<p style="color: #aaa; font-style: italic;">No pending deposit requests found...</p>`;
            }
        });

        // Approve Function: Reads balance node -> Adds request amount -> Deletes Request Log
        function approveDeposit(uid, amount, utr) {
            let balanceRef = database.ref('users/' + uid + '/balance');
            balanceRef.once('value', (snapshot) => {
                let currentBal = snapshot.val() ? parseFloat(snapshot.val()) : 0.00;
                let finalBal = currentBal + parseFloat(amount);
                
                // Set total back inside user wallet card node
                balanceRef.set(finalBal).then(() => {
                    database.ref('depositRequests/' + utr).remove(); // Clear pending item log
                    alert("Approved! User wallet automatically credited successfully.");
                });
            });
        }

        // Reject Function
        function rejectDeposit(utr) {
            database.ref('depositRequests/' + utr).remove().then(() => {
                alert("Request Rejected and Removed.");
            });
        }

        // Publish live match variables
        function publishMatchDetails() {
            let title = document.getElementById('match-title').value;
            let time = document.getElementById('match-time').value;
            let fee = document.getElementById('match-fee').value;
            let kill = document.getElementById('match-kill').value;

            if(!title || !time || !fee || !kill) { alert("Fields fill kijiye!"); return; }

            database.ref('activeMatch').update({
                title: title, time: time, fee: fee, kill: kill, roomId: "", roomPass: ""
            }).then(() => { alert("Live Match Details Updated on User Front-End!"); });
        }

        // Publish Live Room Controls
        function publishRoomDetails() {
            let rId = document.getElementById('room-id').value;
            let rPass = document.getElementById('room-pass').value;
            if(!rId || !rPass) { alert("Enter both Room Context ID and Pass!"); return; }

            database.ref('activeMatch').update({ roomId: rId, roomPass: rPass }).then(() => {
                alert("Room Credentials Published successfully!");
            });
        }
    </script>
</body>
</html>
